<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Cloud Sheet — Бюро</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">

    <style>
        :root { --bg: #ffffff; --border: #000; --max-w: 1100px; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; color: #000 !important; }
        input, button, textarea, div, span, a { color: #000 !important; font-family: inherit; }
        
        body.lock-scroll { overflow: hidden; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 10px solid #000; box-sizing: border-box; }
        .auth-box { display: flex; flex-direction: column; gap: 15px; width: 300px; text-align: center; align-items: center; }
        .auth-input { padding: 12px; border: 2px solid #000; font-size: 16px !important; text-align: center; text-transform: uppercase; outline: none; width: 100%; box-sizing: border-box; border-radius: 0; }
        .auth-logo { width: 120px; height: auto; margin-bottom: 10px; }

        /* HEADER */
        .app-header {
            width: 100%; max-width: var(--max-w);
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; box-sizing: border-box;
            background: #fff; border-bottom: 2px solid #000;
            position: sticky; top: 0; z-index: 100;
        }
        .logo svg { height: 44px; width: auto; display: block; }
        .burger { width: 30px; height: 24px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger span { display: block; width: 100%; height: 4px; background: #000; border-radius: 2px; }

        /* MENU */
        .menu-drawer { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: #fff; border-left: 2px solid #000; z-index: 2000; transition: right 0.3s ease; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; box-shadow: -5px 0 20px rgba(0,0,0,0.2); }
        .menu-drawer.active { right: 0; }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1999; }
        .menu-overlay.active { display: block; }
        .menu-section { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 15px; }
        .menu-title { font-weight: bold; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; color: #666 !important; }

        .char-list-item { padding: 10px; border: 1px solid #ddd; background: #eee; margin-bottom: 5px; cursor: pointer; font-weight: bold; font-size: 14px; border-radius: 4px; }
        .char-list-item.selected { border: 2px solid #000; background: #fff; }
        .char-list-item.add-new { background: #000; color: #fff !important; text-align: center; border: 2px solid #000; margin-top: 10px; }

        /* GRID SYSTEM */
        .sheet {
            display: grid; width: 100%; max-width: var(--max-w); background: #fff; padding: 20px; grid-gap: 20px; box-sizing: border-box;
            grid-template-areas: 
                "name      name      name"
                "person    person    person"
                "left-col  skills    right-col";
            grid-template-columns: 1fr 1.1fr 1fr;
            grid-template-rows: auto auto 1fr;
        }

        .sec-name { grid-area: name; padding: 0 5px; } 
        #name { 
            width: 100%; 
            font-size: 32px; 
            font-weight: 900; 
            border: none; 
            outline: none; 
            background: transparent;
            word-wrap: break-word;
            overflow: hidden;
            resize: none;
            display: block;
            height: auto;
            line-height: 1.1;
            padding: 10px 0;
            text-transform: uppercase;
        }

        .sec-person { grid-area: person; margin-bottom: 10px; }
        .side-col { display: flex; flex-direction: column; gap: 20px; }
        .left-area { grid-area: left-col; }
        .right-area { grid-area: right-col; }
        .skills-area { grid-area: skills; }

        .section { border: 2px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .header { background: #000; color: #fff !important; text-align: center; padding: 10px; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; position: relative; }
        
        .add-btn { cursor: pointer; background: #fff; color: #000 !important; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #000; line-height: 18px; font-size: 18px; font-weight: bold; text-align: center; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); }

        .content { padding: 15px; flex-grow: 1; font-size: 14px; }
        
        .stat-grid { display: flex; justify-content: space-around; gap: 5px; }
        .circle-stat { width: 44px; height: 44px; border: 2.5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; overflow: hidden; }
        .circle-stat input { width: 100%; height: 100%; text-align: center; font-weight: bold; border: none; outline: none; font-size: 18px !important; background: transparent; padding: 0; }
        .label { font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; }

        .item-row { display: flex; align-items: center; margin-bottom: 6px; gap: 12px; min-height: 24px; }
        .item-row span { font-weight: 700; font-size: 15px; }
        .dots { display: flex; gap: 6px; flex-shrink: 0; }
        .dot { width: 18px; height: 18px; border: 1.8px solid #000; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
        .dot.filled { background: #000; }
        .par-input { width: 100%; border: none; border-bottom: 1.5px solid #000; font-size: 15px; font-weight: bold; outline: none; background: transparent; padding: 0; }
        hr { border: 0; border-top: 1.5px dashed #999; margin: 10px 0; width: 100%; }

        .pill-tabs { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        .pill-btn { padding: 6px 16px; border: 1.5px solid #000; border-radius: 20px; background: #fff; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .pill-btn.active { background: #000; color: #fff !important; }

        .list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; min-height: 20px; }
        .list-item { padding: 8px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 13px; background: #f9f9f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .drawer-overlay { display: none; position: fixed; z-index: 9998; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .drawer { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: #fff; z-index: 9999; border-radius: 20px 20px 0 0; padding: 20px; transition: bottom 0.3s ease; display: flex; flex-direction: column; box-shadow: 0 -5px 25px rgba(0,0,0,0.2); box-sizing: border-box; }
        .drawer.active { bottom: 0; }
        
        #dText { min-height: 150px; padding: 10px; border: 2px solid #000; font-size: 16px; margin-bottom: 15px; resize: none; outline: none; }
        .btn { padding: 8px 16px; border: 2px solid #000; background: #fff; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: #000; color: #fff !important; }

        .mobile-tabs-container { display: none; }
        
        @media (max-width: 850px) {
            .sheet { display: flex; flex-direction: column; padding: 15px; }
            #name { font-size: 28px; }
            .left-area, .right-area, .skills-area { display: contents; }
            .sec-name { order: 1; }
            .sec-person { order: 2; }
            .left-area > .section:nth-child(1) { order: 3; }
            .left-area > .section:nth-child(2) { order: 4; }
            .left-area > .section:nth-child(3) { order: 5; }
            .mobile-tabs-container { display: block; order: 6; margin: 10px 0; }
            .sec-skills { order: 7; }
            .sec-paradigm { order: 8; }
            .sec-actions { order: 9; }
            .sec-skills, .sec-paradigm, .sec-actions { display: none; width: 100%; }
            .sec-skills.active, .sec-paradigm.active, .sec-actions.active { display: block; }
            .right-area > .section:nth-child(2) { order: 10; }
            .right-area > .section:nth-child(3) { order: 11; }
            .section { margin-bottom: 15px; }
        }
    </style>
</head>

<div class="sheet">
    <div class="section sec-name" style="border:none">
        <textarea id="name" placeholder="ИМЯ АГЕНТА" rows="1" oninput="adjustNameHeight(this); updateCharName(this.value); autoSave()"></textarea>
    </div>

    <div class="section sec-person">
        <div class="content">
            <div class="pill-tabs">
                <div class="pill-btn active" id="tab-trait-btn" onclick="switchPersonTab('trait')">Черты</div>
                <div class="pill-btn" id="tab-flaw-btn" onclick="switchPersonTab('flaw')">Изъяны</div>
                <div class="add-btn" style="position:static; transform:none;" onclick="addCurrentSubItem()">+</div>
            </div>
            <div id="panel-trait" class="list-container"></div>
            <div id="panel-flaw" class="list-container" style="display:none;"></div>
        </div>
    </div>

    <div class="side-col left-area">
        <div class="section">
            <div class="header">Состояние</div>
            <div class="content stat-grid">
                <div><div class="circle-stat"><input type="number" data-id="hp" oninput="validateStat(this); autoSave()"></div><div class="label">Раны</div></div>
                <div><div class="circle-stat"><input type="number" data-id="ar" oninput="validateStat(this); autoSave()"></div><div class="label">Броня</div></div>
                <div><div class="circle-stat"><input type="number" data-id="sa" oninput="validateStat(this); autoSave()"></div><div class="label">Рассуд.</div></div>
            </div>
        </div>
        <div class="section">
            <div class="header">Характеристики</div>
            <div class="content stat-grid">
                <div><div class="circle-stat"><input type="number" data-id="b" oninput="validateStat(this); autoSave()"></div><div class="label">Тело</div></div>
                <div><div class="circle-stat"><input type="number" data-id="m" oninput="validateStat(this); autoSave()"></div><div class="label">Разум</div></div>
                <div><div class="circle-stat"><input type="number" data-id="s" oninput="validateStat(this); autoSave()"></div><div class="label">Душа</div></div>
            </div>
        </div>
        <div class="section">
            <div class="header">Спасброски</div>
            <div class="content stat-grid">
                <div><div class="circle-stat"><input type="number" data-id="sv1" oninput="validateStat(this); autoSave()"></div><div class="label">Уклон.</div></div>
                <div><div class="circle-stat"><input type="number" data-id="sv2" oninput="validateStat(this); autoSave()"></div><div class="label">Психика</div></div>
            </div>
        </div>
        <div class="section sec-paradigm">
            <div class="header">Парадигма</div>
            <div class="content" id="paradigm-list"></div>
        </div>
    </div>

    <div class="skills-area">
        <div class="mobile-tabs-container">
            <div class="pill-tabs" style="justify-content:center;">
                <div class="pill-btn active tab-m-btn" onclick="setMobileTab('skills', this)">Навыки</div>
                <div class="pill-btn tab-m-btn" onclick="setMobileTab('paradigm', this)">Парадигма</div>
                <div class="pill-btn tab-m-btn" onclick="setMobileTab('actions', this)">Действия</div>
            </div>
        </div>
        <div class="section sec-skills active">
            <div class="header">Навыки</div>
            <div class="content" id="skills-list"></div>
        </div>
    </div>

    <div class="side-col right-area">
        <div class="section sec-actions">
            <div class="header">Действия</div>
            <div class="content" id="actions-list"></div>
        </div>
        <div class="section">
            <div class="header">Травмы <div class="add-btn" onclick="openDrawer('trauma', -1)">+</div></div>
            <div class="content"><div id="trauma-list" class="list-container"></div></div>
        </div>
        <div class="section" style="flex-grow:1;">
            <div class="header">Заметки <div class="add-btn" onclick="openDrawer('note', -1)">+</div></div>
            <div class="content"><div id="note-list" class="list-container"></div></div>
        </div>
    </div>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<div id="uDrawer" class="drawer">
    <h3 id="dTitle">Запись</h3>
    <textarea id="dText"></textarea>
    <div style="display:flex; justify-content:space-between; gap:10px;">
        <button id="dDelBtn" class="btn" style="color:red; border-color:red;" onclick="deleteEntry()">Удалить</button>
        <div style="display:flex; gap:10px; margin-left:auto;">
            <button class="btn" onclick="closeDrawer()">Отмена</button>
            <button class="btn" style="background:#000; color:#fff !important;" onclick="saveDrawer()">Готово</button>
        </div>
    </div>
</div>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbxGIirmjfctTSgafg-WAXDdQwI7v4iJTVi-Ijp9b58uEclIdshg1OtRcqMWUt_1gh4vaw/exec';
    const SKILLS = ["Внимание", "Эрудиция", "Наука", "Оккультизм", "Компьютеры", "Медицина", "Ремонт", "sep", "Ближний бой", "Легк. оружие", "Тяж. оружие", "Психическая сила", "sep", "Убеждение", "Обман", "Запугивание", "sep", "Атлетика", "Уклонение", "Скрытность", "Взлом", "sep", "custom1", "custom2", "custom3", "custom4"];
    const ACTIONS = ["Ответный выстрел", "Доп. выстрел", "Атака возможности", "Контр-атака", "Доп. удар"];
    const TYPE_LABELS = { note: 'Заметка', trauma: 'Травма', flaw: 'Изъян', trait: 'Черта' };

    let characters = [], activeCharIndex = 0, currentPartyId = '', curType = '', curIdx = -1, activeSubTab = 'trait', syncTimer;

    function adjustNameHeight(el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; }
    function validateStat(el) { let val = el.value.replace(/\D/g, ''); if (val !== "") { let num = parseInt(val); if (num > 100) num = 100; if (num < 0) num = 0; el.value = num; } else { el.value = ""; } }
    function toggleMenu() { document.getElementById('menu-drawer').classList.toggle('active'); document.getElementById('menu-overlay').classList.toggle('active'); }
    function autoSave() { clearTimeout(syncTimer); syncTimer = setTimeout(() => syncWithCloud(), 2000); }

    async function syncWithCloud() {
        if(!currentPartyId) return;
        saveCurrentToState();
        try { await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ partyId: currentPartyId, content: JSON.stringify(characters) }) }); } 
        catch (e) { console.error("Sync error", e); }
    }

    async function fetchUpdate() {
        if(!currentPartyId) return;
        try {
            const res = await fetch(`${CLOUD_URL}?partyId=${currentPartyId}`);
            const text = await res.text();
            if (text && text !== "Not Found") { characters = JSON.parse(text); renderCharList(); loadActiveToUI(); }
        } catch (e) { console.error("Fetch error", e); }
    }

    async function connectToParty() {
        const key = document.getElementById('party-key-input').value.trim().toUpperCase();
        if(!key) return;
        const res = await fetch(`${CLOUD_URL}?partyId=${key}`);
        const text = await res.text();
        if (text !== "Not Found") { characters = JSON.parse(text); currentPartyId = key; finishAuth(); }
        else { alert("Партия не найдена"); }
    }

    function createNewParty() { currentPartyId = Math.random().toString(36).substr(2, 6).toUpperCase(); characters = [createNewCharObj("Агент 1")]; finishAuth(); syncWithCloud(); }
    function finishAuth() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('display-key').innerText = currentPartyId; initLayout(); renderCharList(); loadActiveToUI(); }
    
    // Чистый объект нового персонажа
    function createNewCharObj(name) { 
        return { 
            meta: { n: name }, 
            stats: { hp:"", ar:"", sa:"", b:"", m:"", s:"", sv1:"", sv2:"" }, 
            skills: {}, 
            traumas: [], notes: [], flaws: [], traits: [], rads: [], par: ["", "", ""],
            customSkillNames: ["", "", "", ""]
        }; 
    }
    
    function addNewCharacter() { 
        saveCurrentToState(); 
        const newChar = createNewCharObj("Новый агент");
        characters.push(newChar); 
        activeCharIndex = characters.length - 1; 
        
        // Сброс всех инпутов в UI перед загрузкой
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('filled'));
        
        renderCharList(); 
        loadActiveToUI(); 
        autoSave(); 
        toggleMenu(); 
    }

    function switchCharacter(idx) { saveCurrentToState(); activeCharIndex = idx; renderCharList(); loadActiveToUI(); toggleMenu(); }
    function updateCharName(val) { characters[activeCharIndex].meta.n = val; renderCharList(); }

    function saveCurrentToState() {
        const c = characters[activeCharIndex];
        if(!c) return;
        c.meta.n = document.getElementById('name').value;
        document.querySelectorAll('[data-id]').forEach(i => c.stats[i.dataset.id] = i.value);
        document.querySelectorAll('.dots').forEach(s => { if(s.dataset.skill) c.skills[s.dataset.skill] = s.querySelectorAll('.filled').length; });
        c.par = Array.from(document.querySelectorAll('.sec-paradigm .par-input')).map(i => i.value);
        c.rads = ACTIONS.map((_, i) => document.getElementById(`act-dot-${i}`)?.classList.contains('filled') || false);
        c.customSkillNames = Array.from(document.querySelectorAll('.sec-skills .par-input')).map(i => i.value);
    }

    function loadActiveToUI() {
        const c = characters[activeCharIndex];
        if(!c) return;
        const nameEl = document.getElementById('name');
        nameEl.value = c.meta.n || "";
        adjustNameHeight(nameEl);
        
        document.querySelectorAll('[data-id]').forEach(el => { el.value = (c.stats && c.stats[el.dataset.id]) || ""; });
        document.querySelectorAll('.dots').forEach(s => { 
            const val = (c.skills && c.skills[s.dataset.skill]) || 0; 
            s.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('filled', i < val)); 
        });
        document.querySelectorAll('.sec-paradigm .par-input').forEach((inp, i) => inp.value = (c.par && c.par[i]) || "");
        document.querySelectorAll('.sec-skills .par-input').forEach((inp, i) => inp.value = (c.customSkillNames && c.customSkillNames[i]) || "");
        ACTIONS.forEach((_, i) => document.getElementById(`act-dot-${i}`)?.classList.toggle('filled', !!(c.rads && c.rads[i])));
        renderTextLists();
    }

    function initLayout() {
        const sc = document.getElementById('skills-list'); sc.innerHTML = '';
        SKILLS.forEach(s => {
            if(s === "sep") sc.innerHTML += '<hr>';
            else if(s.startsWith("custom")) sc.innerHTML += `<div class="item-row"><div class="dots" data-skill="${s}">${[1,2,3].map(n => `<div class="dot" onclick="clickDot(this, ${n}); autoSave()"></div>`).join('')}</div><input type="text" class="par-input" oninput="autoSave()" placeholder="Задать навык..."></div>`;
            else sc.innerHTML += `<div class="item-row"><div class="dots" data-skill="${s}">${[1,2,3].map(n => `<div class="dot" onclick="clickDot(this, ${n}); autoSave()"></div>`).join('')}</div><span>${s}</span></div>`;
        });
        const pc = document.getElementById('paradigm-list'); pc.innerHTML = '';
        for(let i=0; i<3; i++) pc.innerHTML += `<div class="item-row"><div class="dots" data-skill="p${i}">${[1,2,3].map(n => `<div class="dot" onclick="clickDot(this, ${n}); autoSave()"></div>`).join('')}</div><input type="text" class="par-input" oninput="autoSave()"></div>`;
        const ac = document.getElementById('actions-list'); ac.innerHTML = '';
        ACTIONS.forEach((a, i) => ac.innerHTML += `<div class="item-row" onclick="toggleAction(${i}); autoSave()" style="cursor:pointer"><span>${a}</span><div class="dot" id="act-dot-${i}" style="margin-left:auto;"></div></div>`);
    }

    function clickDot(el, lvl) { const ds = el.parentElement.querySelectorAll('.dot'); const isFilled = el.classList.contains('filled'); ds.forEach((d, i) => d.classList.toggle('filled', i < (isFilled ? lvl - 1 : lvl))); }
    function toggleAction(idx) { document.getElementById(`act-dot-${idx}`).classList.toggle('filled'); }
    function switchPersonTab(type) { activeSubTab = type; document.getElementById('tab-trait-btn').classList.toggle('active', type === 'trait'); document.getElementById('tab-flaw-btn').classList.toggle('active', type === 'flaw'); document.getElementById('panel-trait').style.display = type === 'trait' ? 'grid' : 'none'; document.getElementById('panel-flaw').style.display = type === 'flaw' ? 'grid' : 'none'; }
    function openDrawer(type, idx) { curType = type; curIdx = idx; const c = characters[activeCharIndex]; const key = type === 'note' ? 'notes' : type === 'trauma' ? 'traumas' : type === 'flaw' ? 'flaws' : 'traits'; document.getElementById('dTitle').innerText = TYPE_LABELS[type]; document.getElementById('dText').value = idx === -1 ? "" : c[key][idx]; document.getElementById('dDelBtn').style.display = idx === -1 ? 'none' : 'block'; document.getElementById('drawerOverlay').style.display = 'block'; setTimeout(() => document.getElementById('uDrawer').classList.add('active'), 10); }
    function closeDrawer() { document.getElementById('uDrawer').classList.remove('active'); setTimeout(() => document.getElementById('drawerOverlay').style.display = 'none', 300); }
    function saveDrawer() { const val = document.getElementById('dText').value.trim(); const c = characters[activeCharIndex]; const key = curType === 'note' ? 'notes' : curType === 'trauma' ? 'traumas' : curType === 'flaw' ? 'flaws' : 'traits'; if(val) { if(curIdx === -1) c[key].push(val); else c[key][curIdx] = val; renderTextLists(); autoSave(); } closeDrawer(); }
    function deleteEntry() { const c = characters[activeCharIndex]; const key = curType === 'note' ? 'notes' : curType === 'trauma' ? 'traumas' : curType === 'flaw' ? 'flaws' : 'traits'; c[key].splice(curIdx, 1); renderTextLists(); autoSave(); closeDrawer(); }
    function renderTextLists() { const c = characters[activeCharIndex]; const map = (t, i, type) => `<div class="list-item" onclick="openDrawer('${type}', ${i})">${t}</div>`; document.getElementById('note-list').innerHTML = (c.notes || []).map((t,i)=>map(t,i,'note')).join(''); document.getElementById('trauma-list').innerHTML = (c.traumas || []).map((t,i)=>map(t,i,'trauma')).join(''); document.getElementById('panel-flaw').innerHTML = (c.flaws || []).map((t,i)=>map(t,i,'flaw')).join(''); document.getElementById('panel-trait').innerHTML = (c.traits || []).map((t,i)=>map(t,i,'trait')).join(''); }
    function renderCharList() { document.getElementById('char-list-container').innerHTML = characters.map((c, i) => `<div class="char-list-item ${i===activeCharIndex?'selected':''}" onclick="switchCharacter(${i})">${c.meta.n || 'Без имени'}</div>`).join(''); }
    function setMobileTab(name, btn) { document.querySelectorAll('.tab-m-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.sec-skills, .sec-paradigm, .sec-actions').forEach(s => s.classList.remove('active')); const target = document.querySelector('.sec-' + name); if(target) target.classList.add('active'); }
    function addCurrentSubItem() { openDrawer(activeSubTab, -1); }
    function copyKey() { navigator.clipboard.writeText(currentPartyId); alert("Ключ скопирован: " + currentPartyId); }
</script>
</body>
</html>
