<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG Cloud Sheet — Бюро</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Бюро">
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlJQRyBDbG91ZCBTaGVldCIsCiAgInNob3J0X25hbWUiOiAiQnVyZWF1IiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmZmZmZmYiLAogICJ0aGVtZV9jb2xvciI6ICIjMDAwMDAwIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9pbWcuY29uczhhYmxlLmNvbS9wbmcvNTEyL29wdGljYWxfY29sbG9yL2dlbmVyaWNfdXNlci5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <style>
        :root { --bg: #ffffff; --border: #000; --max-w: 1000px; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Блокировка скролла */
        body.lock-scroll { overflow: hidden; }

        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 10px solid #000; box-sizing: border-box; }
        .auth-box { display: flex; flex-direction: column; gap: 15px; width: 300px; text-align: center; }
        
        /* Фикс зума для iOS: шрифт не менее 16px */
        .auth-input { padding: 12px; border: 2px solid #000; font-size: 16px !important; text-align: center; text-transform: uppercase; outline: none; width: 100%; box-sizing: border-box; }

        .top-bar { display: flex; width: 100%; max-width: var(--max-w); gap: 10px; margin-bottom: 20px; align-items: center; overflow-x: auto; padding-bottom: 5px; }
        .char-tabs { display: flex; gap: 5px; }
        .tab-char { padding: 8px 15px; border: 2px solid #000; background: #eee; cursor: pointer; font-weight: bold; white-space: nowrap; border-radius: 4px; }
        .tab-char.active { background: #000; color: #fff; }
        .add-char { background: #27ae60; color: #fff; border: 2px solid #27ae60; }

        .controls { display: flex; gap: 10px; margin-left: auto; align-items: center; }
        .btn { padding: 8px 16px; border: 2px solid #000; background: #fff; cursor: pointer; font-weight: bold; border-radius: 4px; white-space: nowrap; }
        .btn:hover { background: #000; color: #fff; }
        #display-key { font-family: monospace; font-size: 12px; background: #f0f0f0; padding: 5px 10px; border: 1px dashed #000; cursor: pointer; }
        #sync-status { font-size: 10px; text-transform: uppercase; font-weight: bold; color: #888; white-space: nowrap; }

        .sheet {
            display: grid; width: 100%; max-width: var(--max-w); background: #fff; padding: 20px; grid-gap: 15px; box-sizing: border-box;
            grid-template-areas: 
                "name person person"
                "state skills actions"
                "chars skills actions"
                "saves skills traumas"
                "paradigm skills traumas"
                "notes notes notes";
            grid-template-columns: 1fr 1.2fr 1fr;
        }

        .sec-name { grid-area: name; } .sec-person { grid-area: person; }
        .sec-state { grid-area: state; } .sec-chars { grid-area: chars; } .sec-saves { grid-area: saves; }
        .sec-paradigm { grid-area: paradigm; } .sec-skills { grid-area: skills; }
        .sec-actions { grid-area: actions; } .sec-traumas { grid-area: traumas; } .sec-notes { grid-area: notes; }

        .section { border: 2px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; background: #fff; position: relative; }
        .header { background: #000; color: #fff; text-align: center; padding: 8px; font-weight: bold; text-transform: uppercase; font-size: 11px; border-radius: 7px 7px 0 0; display: flex; justify-content: center; align-items: center; position: relative; z-index: 5; }
        
        .sub-tabs { display: flex; background: #eee; border-bottom: 2px solid #000; position: relative; }
        .sub-tab { flex: 1; padding: 5px; text-align: center; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-right: 1px solid #ccc; }
        .sub-tab:last-child { border-right: none; }
        .sub-tab.active { background: #fff; color: #000; box-shadow: inset 0 -3px 0 #000; }

        .add-btn { position: absolute; right: 8px; cursor: pointer; background: #fff; color: #000; width: 20px; height: 20px; border-radius: 50%; line-height: 18px; font-size: 16px; font-weight: bold; text-align: center; z-index: 10; }

        .content { padding: 10px; flex-grow: 1; }
        .list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; min-height: 20px; }
        .list-item { padding: 8px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 12px; background: #fafafa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .stat-grid { display: flex; justify-content: space-around; gap: 5px; }
        .circle-stat { width: 42px; height: 42px; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
        .circle-stat input { width: 28px; text-align: center; font-weight: bold; border: none; outline: none; font-size: 16px !important; background: transparent; }
        .label { font-size: 9px; font-weight: bold; text-transform: uppercase; text-align: center; }
        .item-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
        .dots { display: flex; gap: 4px; }
        .dot { width: 13px; height: 13px; border: 1.5px solid #000; border-radius: 50%; cursor: pointer; }
        .dot.filled { background: #000; }
        .action-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
        .action-row input[type="radio"] { accent-color: #000; width: 16px; height: 16px; cursor: pointer; }

        /* Дровер (Drawer) */
        .drawer-overlay { display: none; position: fixed; z-index: 9998; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .drawer { 
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); 
            width: 100%; max-width: var(--max-w); max-height: 80%; 
            background: #fff; z-index: 9999; border-radius: 20px 20px 0 0; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.2); transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-sizing: border-box; padding: 20px; display: flex; flex-direction: column;
        }
        .drawer.active { bottom: 0; }
        .drawer-handle { width: 40px; height: 5px; background: #ccc; border-radius: 10px; margin: 0 auto 15px; flex-shrink: 0; }
        .drawer h3 { margin: 0 0 15px 0; text-transform: uppercase; font-size: 14px; text-align: center; }
        .drawer textarea { width: 100%; flex-grow: 1; min-height: 150px; border: 2px solid #000; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 16px !important; outline: none; font-family: inherit; resize: none; }

        .mobile-tabs { display: none; }
        @media (max-width: 850px) {
            .sheet { grid-template-columns: 1fr 1fr; grid-template-areas: "name name" "person person" "state saves" "chars chars" "tabs tabs" "t-content t-content" "traumas traumas" "notes notes"; }
            .mobile-tabs { display: flex; grid-area: tabs; gap: 4px; margin: 10px 0; }
            .tab-btn { flex: 1; padding: 10px; border: 2px solid #000; background: #fff; font-weight: bold; font-size: 11px; }
            .tab-btn.active { background: #000; color: #fff; }
            .sec-skills, .sec-paradigm, .sec-actions { display: none; grid-area: t-content; }
            .sec-skills.active, .sec-paradigm.active, .sec-actions.active { display: flex; }
            .drawer { width: 100%; border-radius: 20px 20px 0 0; border: none; }
            input[type="text"] { font-size: 16px !important; } /* Системный фикс зума */
        }

        #backTop { position: fixed; bottom: 15px; right: 15px; display: none; width: 40px; height: 40px; background: #000; color: #fff; border-radius: 50%; border: none; z-index: 1000; }
        input[type="text"] { width: 100%; border: none; outline: none; font-size: 14px; background: transparent; }
        hr { border: 0; border-top: 1px dashed #ccc; margin: 8px 0; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1>Бюро Парадигмальных Исследований</h1>
        <p style="font-size:12px;">Введите код ячейки или создайте новую</p>
        <input type="text" id="party-key-input" class="auth-input" placeholder="КОД ПАРТИИ">
        <button class="btn" style="background:#000; color:#fff; padding:12px;" onclick="connectToParty()">ПОДКЛЮЧИТЬСЯ</button>
        <div style="display:flex; align-items:center; gap:10px;"><hr style="flex:1;"> ИЛИ <hr style="flex:1;"></div>
        <button class="btn" onclick="createNewParty()">СОЗДАТЬ НОВУЮ ПАРТИЮ</button>
    </div>
</div>

<div class="top-bar">
    <div class="char-tabs" id="char-tabs-list"></div>
    <button class="tab-char add-char" onclick="addNewCharacter()">+</button>
    <div class="controls">
        <button class="btn" onclick="fetchUpdate()">🔄</button>
        <div id="display-key" onclick="copyKey()">🔑 KEY</div>
        <span id="sync-status">Готов</span>
    </div>
</div>

<div class="sheet">
    <div class="section sec-name"><div class="header">Имя</div><div class="content"><input type="text" id="name" oninput="updateCharName(this.value); autoSave()"></div></div>
    
    <div class="section sec-person">
        <div class="sub-tabs">
            <div class="sub-tab active" id="tab-trait-btn" onclick="switchPersonTab('trait')">Черты</div>
            <div class="sub-tab" id="tab-flaw-btn" onclick="switchPersonTab('flaw')">Изъяны</div>
            <div class="add-btn" style="top:5px;" onclick="addCurrentSubItem()">+</div>
        </div>
        <div id="panel-trait" class="content"><div id="trait-list" class="list-container"></div></div>
        <div id="panel-flaw" class="content" style="display:none;"><div id="flaw-list" class="list-container"></div></div>
    </div>
    
    <div class="section sec-state"><div class="header">Состояние</div><div class="content stat-grid">
        <div><div class="circle-stat"><input type="text" data-id="hp" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Раны</div></div>
        <div><div class="circle-stat"><input type="text" data-id="ar" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Броня</div></div>
        <div><div class="circle-stat"><input type="text" data-id="sa" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Рассуд.</div></div>
    </div></div>

    <div class="section sec-saves"><div class="header">Спасброски</div><div class="content stat-grid">
        <div><div class="circle-stat"><input type="text" data-id="sv1" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Уклон.</div></div>
        <div><div class="circle-stat"><input type="text" data-id="sv2" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Психика</div></div>
    </div></div>

    <div class="section sec-chars"><div class="header">Характеристики</div><div class="content stat-grid">
        <div><div class="circle-stat"><input type="text" data-id="b" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Тело</div></div>
        <div><div class="circle-stat"><input type="text" data-id="m" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Разум</div></div>
        <div><div class="circle-stat"><input type="text" data-id="s" value="0" oninput="validateValue(this); autoSave()"></div><div class="label">Душа</div></div>
    </div></div>

    <div class="mobile-tabs">
        <button class="tab-btn active" onclick="setTab('skills', this)">Навыки</button>
        <button class="tab-btn" onclick="setTab('paradigm', this)">Парадигма</button>
        <button class="tab-btn" onclick="setTab('actions', this)">Действия</button>
    </div>

    <div class="section sec-skills active"><div class="header">Навыки</div><div class="content" id="skills-list"></div></div>
    <div class="section sec-paradigm"><div class="header">Парадигма</div><div class="content" id="paradigm-list"></div></div>
    <div class="section sec-actions"><div class="header">Действия</div><div class="content" id="actions-list"></div></div>

    <div class="section sec-traumas">
        <div class="header">Психические травмы <div class="add-btn" onclick="openDrawer('trauma', -1)">+</div></div>
        <div class="content"><div id="trauma-list" class="list-container"></div></div>
    </div>

    <div class="section sec-notes">
        <div class="header">Заметки <div class="add-btn" onclick="openDrawer('note', -1)">+</div></div>
        <div class="content"><div id="note-list" class="list-container"></div></div>
    </div>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<div id="uDrawer" class="drawer">
    <div class="drawer-handle" onclick="closeDrawer()"></div>
    <h3 id="dTitle">Запись</h3>
    <textarea id="dText"></textarea>
    <div style="display:flex; justify-content:space-between; gap:10px; margin-top:20px;">
        <button id="dDelBtn" class="btn" style="color:red; border-color:red; display:none;" onclick="deleteEntry()">Удалить</button>
        <div style="display:flex; gap:10px; margin-left:auto;">
            <button class="btn" onclick="closeDrawer()">Отмена</button>
            <button class="btn" style="background:#000; color:#fff;" onclick="saveDrawer()">Готово</button>
        </div>
    </div>
</div>

<button id="backTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

<script>
    const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbxGIirmjfctTSgafg-WAXDdQwI7v4iJTVi-Ijp9b58uEclIdshg1OtRcqMWUt_1gh4vaw/exec';
    const SKILLS = ["Внимание", "Эрудиция", "Наука", "Оккультизм", "Компьютеры", "Медицина", "Ремонт", "sep", "Ближний бой", "Легк. оружие", "Тяж. оружие", "Психическая сила", "sep", "Убеждение", "Обман", "Запугивание", "sep", "Атлетика", "Уклонение", "Скрытность", "Взлом"];

    let characters = [];
    let activeCharIndex = 0;
    let currentPartyId = '';
    let curType = '', curIdx = -1;
    let activeSubTab = 'trait';
    let syncTimer;

    function validateValue(el) {
        let val = parseInt(el.value);
        if (isNaN(val)) return;
        if (val > 100) el.value = 100;
        if (val < 0) el.value = 0;
    }

    function autoSave() {
        document.getElementById('sync-status').innerText = "✏️...";
        clearTimeout(syncTimer);
        syncTimer = setTimeout(() => { syncWithCloud(); }, 2000); 
    }

    async function syncWithCloud() {
        if(!currentPartyId) return;
        saveCurrentToState();
        try {
            await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ partyId: currentPartyId, content: JSON.stringify(characters) }) });
            document.getElementById('sync-status').innerText = "✅";
        } catch (e) { document.getElementById('sync-status').innerText = "❌"; }
    }

    async function fetchUpdate() {
        if(!currentPartyId) return;
        try {
            const response = await fetch(`${CLOUD_URL}?partyId=${currentPartyId}`);
            const text = await response.text();
            if (text && text !== "Not Found") {
                characters = JSON.parse(text);
                renderTabs(); loadActiveToUI();
                document.getElementById('sync-status').innerText = "✅";
            }
        } catch (e) {}
    }

    async function connectToParty() {
        const key = document.getElementById('party-key-input').value.trim().toUpperCase();
        if (!key) return;
        try {
            const response = await fetch(`${CLOUD_URL}?partyId=${key}`);
            const text = await response.text();
            if (text !== "Not Found" && text) { characters = JSON.parse(text); currentPartyId = key; finishAuth(); }
            else alert("Не найдено");
        } catch (e) {}
    }

    function createNewParty() {
        currentPartyId = Math.random().toString(36).substr(2, 6).toUpperCase();
        characters = [createNewCharObj("Герой 1")];
        finishAuth(); syncWithCloud();
    }

    function finishAuth() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('display-key').innerText = "🔑 " + currentPartyId;
        renderTabs(); loadActiveToUI();
    }

    function createNewCharObj(name) {
        return { meta: { n: name }, stats: { hp: "0", ar: "0", sa: "0", sv1: "0", sv2: "0", b: "0", m: "0", s: "0" }, skills: {}, traumas: [], notes: [], flaws: [], traits: [], rads: [false, false, false, false, false], par: ["", "", ""] };
    }

    function addNewCharacter() {
        saveCurrentToState();
        characters.push(createNewCharObj("Новый герой"));
        activeCharIndex = characters.length - 1;
        renderTabs(); loadActiveToUI(); autoSave();
    }

    function switchCharacter(idx) {
        saveCurrentToState(); activeCharIndex = idx;
        renderTabs(); loadActiveToUI();
    }

    function updateCharName(val) { characters[activeCharIndex].meta.n = val; renderTabs(); }

    function saveCurrentToState() {
        if (!characters[activeCharIndex]) return;
        const c = characters[activeCharIndex];
        c.meta.n = document.getElementById('name').value;
        document.querySelectorAll('[data-id]').forEach(i => c.stats[i.dataset.id] = i.value);
        document.querySelectorAll('.dots').forEach(s => c.skills[s.dataset.skill] = s.querySelectorAll('.filled').length);
        c.par = Array.from(document.querySelectorAll('.par-input')).map(i => i.value);
        c.rads = Array.from(document.querySelectorAll('.act-radio')).map(r => r.checked);
    }

    function loadActiveToUI() {
        const c = characters[activeCharIndex];
        ['flaws', 'traits', 'notes', 'traumas'].forEach(key => { if(!c[key]) c[key] = []; });
        document.getElementById('name').value = c.meta.n;
        Object.keys(c.stats).forEach(k => { const el = document.querySelector(`[data-id="${k}"]`); if(el) el.value = c.stats[k]; });
        document.querySelectorAll('.dots').forEach(s => {
            const val = c.skills[s.dataset.skill] || 0;
            s.querySelectorAll('.dot').forEach((dot, i) => i < val ? dot.classList.add('filled') : dot.classList.remove('filled'));
        });
        document.querySelectorAll('.par-input').forEach((inp, i) => inp.value = c.par[i] || "");
        document.querySelectorAll('.act-radio').forEach((rd, i) => { rd.checked = c.rads[i]; rd.dataset.checked = c.rads[i]; });
        renderLists();
    }

    function renderLists() {
        const c = characters[activeCharIndex];
        const mapItem = (type) => (t, i) => `<div class="list-item" onclick="openDrawer('${type}', ${i})">${t}</div>`;
        document.getElementById('note-list').innerHTML = (c.notes || []).map(mapItem('note')).join('');
        document.getElementById('trauma-list').innerHTML = (c.traumas || []).map(mapItem('trauma')).join('');
        document.getElementById('flaw-list').innerHTML = (c.flaws || []).map(mapItem('flaw')).join('');
        document.getElementById('trait-list').innerHTML = (c.traits || []).map(mapItem('trait')).join('');
    }

    function switchPersonTab(type) {
        activeSubTab = type;
        document.getElementById('tab-trait-btn').classList.toggle('active', type === 'trait');
        document.getElementById('tab-flaw-btn').classList.toggle('active', type === 'flaw');
        document.getElementById('panel-trait').style.display = type === 'trait' ? 'block' : 'none';
        document.getElementById('panel-flaw').style.display = type === 'flaw' ? 'block' : 'none';
    }

    function addCurrentSubItem() { openDrawer(activeSubTab, -1); }

    function openDrawer(type, idx) {
        curType = type; curIdx = idx;
        const c = characters[activeCharIndex];
        const titles = { note: 'Заметка', trauma: 'Травма', flaw: 'Изъян', trait: 'Черта' };
        let data = (type === 'note') ? c.notes : (type === 'trauma') ? c.traumas : (type === 'flaw') ? c.flaws : c.traits;
        
        document.getElementById('dTitle').innerText = titles[type];
        document.getElementById('dText').value = (idx === -1) ? "" : data[idx];
        document.getElementById('dDelBtn').style.display = (idx === -1) ? 'none' : 'block';
        
        document.body.classList.add('lock-scroll');
        document.getElementById('drawerOverlay').style.display = 'block';
        setTimeout(() => document.getElementById('uDrawer').classList.add('active'), 10);
    }

    function closeDrawer() {
        document.getElementById('uDrawer').classList.remove('active');
        document.body.classList.remove('lock-scroll');
        setTimeout(() => document.getElementById('drawerOverlay').style.display = 'none', 300);
    }

    function saveDrawer() {
        const val = document.getElementById('dText').value.trim();
        const c = characters[activeCharIndex];
        let data = (curType === 'note') ? c.notes : (curType === 'trauma') ? c.traumas : (curType === 'flaw') ? c.flaws : c.traits;
        if(val) { 
            if(curIdx === -1) data.push(val); 
            else data[curIdx] = val; 
            renderLists(); autoSave(); 
        }
        closeDrawer();
    }

    function deleteEntry() {
        if(curIdx === -1) return;
        const c = characters[activeCharIndex];
        let data = (curType === 'note') ? c.notes : (curType === 'trauma') ? c.traumas : (curType === 'flaw') ? c.flaws : c.traits;
        data.splice(curIdx, 1);
        renderLists(); autoSave(); closeDrawer();
    }

    function initLayout() {
        const sc = document.getElementById('skills-list'); sc.innerHTML = '';
        SKILLS.forEach(s => {
            if(s === "sep") sc.innerHTML += '<hr>';
            else sc.innerHTML += `<div class="item-row"><div class="dots" data-skill="${s}">${[1,2,3].map(n => `<div class="dot" onclick="clickDot(this, ${n}); autoSave()"></div>`).join('')}</div><span>${s}</span></div>`;
        });
        const pc = document.getElementById('paradigm-list'); pc.innerHTML = '';
        for(let i=0; i<3; i++) pc.innerHTML += `<div class="item-row"><div class="dots" data-skill="p${i}">${[1,2,3].map(n => `<div class="dot" onclick="clickDot(this, ${n}); autoSave()"></div>`).join('')}</div><input type="text" class="par-input" oninput="autoSave()" placeholder="..."></div>`;
        const ac = document.getElementById('actions-list'); ac.innerHTML = '';
        ["Ответный выстрел", "Доп. выстрел", "Атака возможности", "Контр-атака", "Доп. удар"].forEach((a, i) => ac.innerHTML += `<div class="action-row"><input type="radio" name="act-${i}" class="act-radio" onclick="toggleRadio(this); autoSave()"><div><strong>${a}</strong></div></div>`);
    }

    function renderTabs() {
        document.getElementById('char-tabs-list').innerHTML = characters.map((c, i) => `<div class="tab-char ${i===activeCharIndex?'active':''}" onclick="switchCharacter(${i})">${c.meta.n || '...'}</div>`).join('');
    }

    function clickDot(el, lvl) {
        const ds = el.parentElement.querySelectorAll('.dot');
        if(!el.classList.contains('filled')) {
            if(lvl > 1 && !ds[lvl-2].classList.contains('filled')) return;
            el.classList.add('filled');
        } else { for(let i=lvl-1; i<ds.length; i++) ds[i].classList.remove('filled'); }
    }

    function toggleRadio(r) {
        if(r.dataset.checked === "true") { r.checked = false; r.dataset.checked = "false"; }
        else { r.dataset.checked = "true"; }
    }

    function setTab(name, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        document.querySelectorAll('.sec-skills, .sec-paradigm, .sec-actions').forEach(s => s.classList.remove('active'));
        document.querySelector('.sec-' + name).classList.add('active');
    }

    function copyKey() { navigator.clipboard.writeText(currentPartyId); alert("Код скопирован"); }

    window.onscroll = () => document.getElementById('backTop').style.display = (window.scrollY > 300) ? 'block' : 'none';
    window.onload = () => { initLayout(); };

    // Service Worker для PWA (In-memory blob)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `self.addEventListener('fetch', function(event) { event.respondWith(fetch(event.request)); });`;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW error:', err));
        });
    }
</script>

</body>
</html>
